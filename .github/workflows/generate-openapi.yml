name: Generate OpenAPI Docs
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate-docs:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: '0'

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Build project and generate OpenAPI
        run: mvn clean verify -Ptest -DskipTests

      - name: Copy OpenAPI file to docs
        run: |
            mkdir -p docs
            cp target/openapi.json docs/openapi.json

      - name: Commit and push docs
        run: |
            git config --local user.name "github-actions[bot]"
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b gh-actions
            git add docs/openapi.json
            git commit -m "docs: Update OpenAPI documentation"
            git push --set-upstream origin gh-actions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
