name: Generate OpenAPI Docs
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-docs:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: '0'

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Build project and generate OpenAPI
        run: mvn clean verify -Ptest -DskipTests

      - name: Commit and push docs to gh-actions branch
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          git fetch origin
          git checkout gh-actions
          git pull origin gh-actions
          
          mkdir -p docs
          cp target/openapi.json docs/openapi.json
          
          if git diff --quiet; then
              echo "No changes to commit"
          else
              git add docs/openapi.json
              git commit -m "docs: Update OpenAPI documentation"
              git push origin gh-actions
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}