name: Push Docker image to registry
on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract version
        id: variables
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        run: echo ${{ secrets.GH_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          docker build \
            --target runtime \
            -t ghcr.io/${{ github.repository_owner }}/expense-splitter-api:${{ steps.variables.outputs.VERSION }} \
            -t ghcr.io/${{ github.repository_owner }}/expense-splitter-api:latest \
            .

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/expense-splitter-api:${{ steps.variables.outputs.VERSION }}
          docker push ghcr.io/${{ github.repository_owner }}/expense-splitter-api:latest