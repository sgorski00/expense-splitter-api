services:
  es-postgres:
    image: postgres:18.2-alpine
    container_name: es-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - es-postgres-data:/var/lib/postgresql/18/docker
    networks:
      - es-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5

  es-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: es-web-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      es-postgres:
        condition: service_healthy
      es-mailhog:
        condition: service_started
    networks:
      - es-network

  es-mailhog:
    image: mailhog/mailhog
    container_name: es-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - es-network

volumes:
  es-postgres-data:

networks:
  es-network:
    driver: bridge