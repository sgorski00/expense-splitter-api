springdoc.swagger-ui.enabled=false

# Database configuration
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# OAuth2 dummy config for tests
spring.security.oauth2.client.registration.google.client-id=dummy-client-id
spring.security.oauth2.client.registration.google.client-secret=super-strong-and-long-dummy-client-secret-key
spring.security.oauth2.client.registration.facebook.client-id=dummy-client-id
spring.security.oauth2.client.registration.facebook.client-secret=super-strong-and-long-dummy-client-secret-key

# Email configuration - use mock
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test
spring.mail.password=test

# JWT dummy config for tests
jwt.secret-key=super-strong-and-long-dummy-jwt-secret-key
